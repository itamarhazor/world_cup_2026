<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תחזיות משחק</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f1923;
    font-family: 'Segoe UI', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    background: #1a2632;
    border-radius: 20px;
    width: 520px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1e3a5f, #0d2137);
    padding: 24px 28px 20px;
    border-bottom: 1px solid #263a50;
  }
  .match-meta {
    font-size: 11px;
    color: #4a9eff;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .teams {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .team {
    font-size: 22px;
    font-weight: 700;
    color: #ffffff;
  }
  .vs {
    font-size: 13px;
    color: #4a9eff;
    font-weight: 600;
    background: rgba(74,158,255,0.15);
    padding: 4px 10px;
    border-radius: 6px;
  }
  .bet-count {
    text-align: center;
    margin-top: 12px;
    font-size: 12px;
    color: #7a9bb5;
  }
  .bet-count span {
    color: #4a9eff;
    font-weight: 600;
  }

  /* Sections */
  .section {
    padding: 20px 24px;
    border-bottom: 1px solid #263a50;
  }
  .section:last-child { border-bottom: none; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: #4a9eff;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  /* Outcome bar */
  .outcome-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .outcome-label {
    font-size: 13px;
    font-weight: 600;
    color: #c8d8e8;
    width: 90px;
    flex-shrink: 0;
  }
  .outcome-bar-wrap {
    flex: 1;
    background: #0f1923;
    border-radius: 6px;
    height: 28px;
    overflow: hidden;
  }
  .outcome-bar {
    height: 100%;
    border-radius: 6px;
    display: flex;
    align-items: center;
    padding: 0 10px;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
  }
  .bar-home { background: linear-gradient(90deg, #2563eb, #3b82f6); }
  .bar-draw { background: linear-gradient(90deg, #6b7280, #9ca3af); }
  .bar-away { background: linear-gradient(90deg, #dc2626, #ef4444); }

  .outcome-num {
    font-size: 14px;
    font-weight: 700;
    color: #c8d8e8;
    width: 24px;
    text-align: center;
    flex-shrink: 0;
  }
  .outcome-num.zero { color: #3a5068; }

  /* Score distribution */
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .score-badge {
    background: #0f1923;
    border: 1px solid #2a3f55;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    min-width: 64px;
    text-align: center;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }
  .score-bar-wrap {
    flex: 1;
    background: #0f1923;
    border-radius: 5px;
    height: 22px;
    overflow: hidden;
  }
  .score-bar {
    height: 100%;
    border-radius: 5px;
    background: linear-gradient(90deg, #0f6b3d, #16a34a);
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-size: 12px;
    font-weight: 600;
    color: #fff;
  }
  .score-names {
    font-size: 11px;
    color: #7a9bb5;
    margin-top: 2px;
    margin-bottom: 6px;
    padding-right: 76px;
    line-height: 1.4;
  }

  /* Footer */
  .footer {
    background: #131f2a;
    padding: 10px 24px;
    text-align: center;
    font-size: 10px;
    color: #3a5068;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="match-meta">⚽ בית L – עליה &nbsp;·&nbsp; משחק 79</div>
    <!-- e.g. GROUP_LABEL = "בית A", MATCH_LABEL = "משחק 1" -->
    <div class="teams">
      <div class="team">?</div>
      <div class="vs">נגד</div>
      <div class="team"></div>
    </div>
  </div>

  <!-- Outcome distribution -->
  <!-- Bar widths are percentages relative to the highest outcome count (= 100%) -->
  <div class="section">
    <div class="section-title">📊 חלוקת תוצאות</div>

    <div class="outcome-row">
      <div class="outcome-label">? ניצחון</div>
      <div class="outcome-bar-wrap">
        <div class="outcome-bar bar-home" style="width:0.0%">0</div>
      </div>
      <div class="outcome-num zero">0</div>
    </div>

    <div class="outcome-row">
      <div class="outcome-label">תיקו</div>
      <div class="outcome-bar-wrap">
        <div class="outcome-bar bar-draw" style="width:0.0%">0</div>
      </div>
      <div class="outcome-num zero">0</div>
    </div>

    <div class="outcome-row">
      <div class="outcome-label"> ניצחון</div>
      <div class="outcome-bar-wrap">
        <div class="outcome-bar bar-away" style="width:0.0%">0</div>
      </div>
      <div class="outcome-num zero">0</div>
    </div>
  </div>

  <!-- Score distribution -->
  <!-- Repeat the block below for each unique score, sorted by count desc -->
  <!-- Bar widths are percentages relative to the most popular score (= 100%) -->
  <div class="section">
    <div class="section-title">🎯 ניחושי תוצאה</div>



  </div>

  <div class="footer">מונדיאל 2026 · ניחושים לפני המשחק</div>
</div>
</body>
</html>

<!--
=== PLACEHOLDER REFERENCE ===

HEADER
  בית L – עליה       — e.g. "בית A"
  משחק 79       — e.g. "משחק 1"
  ?         — home team name in Hebrew
           — away team name in Hebrew
  34   — number of participants with a non-empty bet
  0     — number of participants with no bet (35 - submitted)

OUTCOME SECTION (bars scale to the max of the three counts = 100%)
  0    — number of bets predicting home win
  0.0      — (home_win / max_outcome) * 100, rounded to 1 decimal
  zero     — "zero" if count is 0 (dims the number), else ""
  (same pattern for DRAW and AWAY_WIN)

SCORE SECTION (bars scale to the most popular score count = 100%)
  {{SCORE}}             — score string, e.g. "2 – 1"
  {{SCORE_COUNT}}       — how many predicted this score
  {{SCORE_PCT}}         — (count / max_score_count) * 100, rounded to 1 decimal
  {{NAMES_LIST}}        — comma-separated names of people who bet this score
-->
